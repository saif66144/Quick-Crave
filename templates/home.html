<!DOCTYPE html>
<html>
<head>
    <title>Quick Crave</title>

<style>
body {
    font-family: Arial;
    background: #f4f4f4;
    margin: 0;
    padding: 0;
}

h1 {
    text-align: center;
    padding: 15px;
}

.card {
    background: white;
    padding: 15px;
    margin: 10px;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.btn {
    padding: 10px 15px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

.btn-dark {
    background: black;
    color: white;
}

.btn-green {
    background: #1db954;
    color: white;
}

.container {
    max-width: 420px;
    margin: auto;
}
</style>

<body style="font-family: Arial; background:#f5f5f5;">

<h1 style="text-align:center;">🍔 Quick Crave</h1>

<a href="orders">
    <button style="padding:10px; background:black; color:white;">
        View Orders
    </button>
</a>

<a href="admin">
    <button style="padding:10px; background:black; color:white;">
        Admin Panel
    </button>
</a>

<div style="max-width:400px; margin:auto;">
{% for key, r in restaurants.items() %}
    <div style="background:white; padding:15px; margin:10px; border-radius:10px;">
        <h2>{{ r.name }}</h2>
        <a href="/menu/{{ key }}">
            <button style="padding:10px; background:black; color:white; border:none; border-radius:5px;">
                View Menu
            </button>
        </a>
    </div>
{% endfor %}
</div>

<div style="text-align:center; margin-top:20px;">
    <a href="/cart">
        <button style="padding:10px 20px; background:green; color:white; border:none; border-radius:5px;">
            🛒 View Cart
        </button>
    </a>
</div>

</body>
</html>
