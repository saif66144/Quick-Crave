<!DOCTYPE html>
<html>
<head>
    <title>Order Success</title>

    <style>
        body {
            font-family: Arial;
            background: #f4f4f4;
            text-align: center;
            padding-top: 50px;
        }

        .card {
            background: white;
            padding: 20px;
            margin: auto;
            max-width: 400px;
            border-radius: 12px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.1);
        }

        .btn {
            padding: 10px 15px;
            border: none;
            border-radius: 8px;
            margin-top: 15px;
            cursor: pointer;
        }

        .btn-green {
            background: #1db954;
            color: white;
        }
    </style>
</head>

<body>

<div class="card">
    <h1>🎉 Order Placed!</h1>
    <p>Thanks for ordering from <b>Quick Crave</b> 😎</p>

    <a href="/">
        <button class="btn btn-green">🏠 Back Home</button>
    </a>
</div>

</body>
</html>
