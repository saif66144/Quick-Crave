<!DOCTYPE html>    
</html>
<head>
<h1>Checkout 🧾</h1>

<style>
body {
    font-family: Arial;
    background: #f4f4f4;
    margin: 0;
    padding: 0;
}

h1 {
    text-align: center;
    padding: 15px;
}

.card {
    background: white;
    padding: 15px;
    margin: 10px;
    border-radius: 12px;
    box-shadow: 0 2px 8px rgba(0,0,0,0.1);
}

.btn {
    padding: 10px 15px;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

.btn-dark {
    background: black;
    color: white;
}

.btn-green {
    background: #1db954;
    color: white;
}

.container {
    max-width: 420px;
    margin: auto;
}
</style>

<ul>
{% for item in cart %}
    <li>
        {{ item.name }} x {{ item.qty }} = £{{ item.price * item.qty }}
    </li>
{% endfor %}
</ul>

<h2>Total: £{{ total }}</h2>

<form action="/place_order" method="POST">
    <button type="submit">✅ Place Order</button>
</form>

<a href="/cart">⬅ Back to Cart</a>

</head>
</body>
</html>
