<!DOCTYPE html>
<html>
<head>
<title>Your Orders</title>

<style>
body {
    font-family: -apple-system, BlinkMacSystemFont, sans-serif;
    background: #f5f5f5;
    padding: 20px;
}

.order {
    background: white;
    padding: 15px;
    margin-bottom: 10px;
    border-radius: 15px;
    box-shadow: 0 3px 8px rgba(0,0,0,0.1);
}

.status {
    font-weight: bold;
}
</style>
</head>

<body>

<h2>📜 Your Orders</h2>

{% for order in orders %}
<div class="order">

    <p><b>Order #{{ order[0] }}</b></p>
    <p>{{ order[1] }}</p>
    <p>Total: £{{ order[2] }}</p>

    <p class="status">Status: {{ order[4] }}</p>

</div>
{% endfor %}

</body>
</html>
